name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/my-app
            git pull origin main
            docker stop gujju-container || true
            docker rm gujju-container || true
            docker build -t gujju-express-app .
            docker run -d -p 3000:3000 --env-file .env --name gujju-container gujju-express-app
